    <!DOCTYPE html>
<html>
<head>
    <title>JSON Validator & Formatter</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        textarea {
            width: 100%;
            height: 200px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
        .output {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #f4f4f4;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>JSON Validator & Formatter</h1>

    <form method="POST">

    <label for="schema_type">Select Schema:</label>
    <select name="schema_type">
        <option value="global" {% if selected_schema == "global" %}selected{% endif %}>Global Payments</option>
        <option value="ach" {% if selected_schema == "ach" %}selected{% endif %}>ACH Payments</option>
    </select>

    <br><br>

    <textarea name="json_input" rows="20" cols="80">{{ json_input }}</textarea>
    <button type="submit">Validate & Format</button>

</form>

    <div class="result">
        {{ result }}
    </div>

        <p><strong>Schema Used:</strong> {{ selected_schema | capitalize }}</p>

    {% if formatted_json %}
    <h2>Formatted JSON:</h2>
    <div class="output">
        {{ formatted_json }}
    </div>
    {% endif %}

</body>
</html>
